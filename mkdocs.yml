site_name: Scribe
site_description: Persistent, typed, auto-replicated player data for Roblox, built on ProfileStore.
site_url: https://ericplane.github.io/Scribe/
repo_url: https://github.com/ericplane/Scribe
repo_name: ericplane/Scribe

# docs_gen/ is generated by docgen/gen.py (via the hook below) from src/ + docs/.
docs_dir: docs_gen

hooks:
  - docgen/mkdocs_hooks.py

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guides:
      - Configuration: configuration.md
      - Templates & Declarators: templates.md
      - Replication & Visibility: visibility.md
      - Session Lifecycle: lifecycle.md
      - Monetization & Gifting: monetization.md
      - Leaderboards: leaderboards.md
      - Diagnostics: diagnostics.md
      - Testing & Edit Mode: testing.md
      - Studio Plugin: studio-plugin.md
      - Migrating to Scribe: migrating.md
      - Custom Transports: transports.md
      - Log Code Reference: log-codes.md
  - API:
      - Scribe: api/scribe.md
      - Server: api/server.md
      - Client: api/client.md
      - Value: api/value.md

plugins:
  - search
