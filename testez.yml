---
# selene standard library for TestEZ globals (used by test/Specs/*.spec.luau)
globals:
  describe:
    args:
      - type: string
      - type: function
  it:
    args:
      - type: string
      - type: function
  itSKIP:
    args:
      - type: string
      - type: function
  itFOCUS:
    args:
      - type: string
      - type: function
  xit:
    args:
      - type: string
      - type: function
  beforeEach:
    args:
      - type: function
  afterEach:
    args:
      - type: function
  beforeAll:
    args:
      - type: function
  afterAll:
    args:
      - type: function
  expect:
    args:
      - type: "..."
