name: Dependency freshness

# Dependabot understands neither wally.toml nor rokit.toml, and wally.lock is
# gitignored — so the Wally deps (ProfileStore/TestEZ) and the rokit toolchain
# can silently fall behind with nothing signalling it. This weekly job compares
# the pinned versions against the latest published ones and opens (or refreshes)
# a single tracking issue when anything is behind. Best-effort: a lookup that
# fails is reported, never fatal.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: deps-freshness
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_TITLE: "Dependency freshness report"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compare pinned versions against latest
        id: check
        run: |
          set -uo pipefail
          report=""

          # newest of two semver-ish strings; empty latest => treat as unknown
          is_behind() { # $1=pinned $2=latest -> prints "yes" if latest is newer
            [ -z "$2" ] && return 1
            newest="$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -1)"
            [ "$newest" != "$1" ] && echo yes || true
          }

          # ---- Wally dependencies (via the Wally registry API) ----
          # Parse `Name = "scope/pkg@version"` lines out of wally.toml.
          while IFS= read -r spec; do
            path="${spec%@*}"       # scope/pkg
            pinned="${spec##*@}"    # version
            latest="$(curl -fsS "https://api.wally.run/v1/package-metadata/${path}" 2>/dev/null \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); vs=[v["package"]["version"] for v in d.get("versions",[])]; print(vs[0] if vs else "")' 2>/dev/null || true)"
            if [ -z "$latest" ]; then
              report="${report}- ⚠️ \`${path}\` (Wally): could not fetch latest (pinned \`${pinned}\`)\n"
            elif [ "$(is_behind "$pinned" "$latest")" = "yes" ]; then
              report="${report}- ⬆️ \`${path}\` (Wally): pinned \`${pinned}\` → latest \`${latest}\`\n"
            fi
          done < <(grep -oE '"[^"]+/[^"@]+@[0-9][^"]*"' wally.toml | tr -d '"')

          # ---- Rokit toolchain (via GitHub releases) ----
          while IFS= read -r spec; do
            repo="${spec%@*}"       # owner/repo
            pinned="${spec##*@}"    # version
            latest="$(gh api "repos/${repo}/releases/latest" --jq .tag_name 2>/dev/null | sed 's/^v//' || true)"
            if [ -z "$latest" ]; then
              report="${report}- ⚠️ \`${repo}\` (rokit): could not fetch latest release (pinned \`${pinned}\`)\n"
            elif [ "$(is_behind "$pinned" "$latest")" = "yes" ]; then
              report="${report}- ⬆️ \`${repo}\` (rokit): pinned \`${pinned}\` → latest \`${latest}\`\n"
            fi
          done < <(grep -oE '"[^"]+/[^"@]+@[0-9][^"]*"' rokit.toml | tr -d '"')

          if [ -z "$report" ]; then
            echo "All tracked dependencies are current."
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            {
              echo "The following pinned dependencies are behind their latest published version."
              echo "Bump them in \`wally.toml\` / \`rokit.toml\` (and keep \`bundle/deps\` in mind for ProfileStore, which ships inside Scribe.rbxm)."
              echo
              printf '%b' "$report"
              echo
              echo "_Generated by the Dependency freshness workflow._"
            } > body.md
            cat body.md
          fi

      - name: Open or refresh the tracking issue
        if: steps.check.outputs.has_updates == 'true'
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --search "in:title \"${ISSUE_TITLE}\"" --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue edit "$existing" --body-file body.md
            gh issue comment "$existing" --body "Refreshed $(date -u +%Y-%m-%d) — see the updated issue body."
            echo "Updated issue #${existing}."
          else
            gh issue create --title "$ISSUE_TITLE" --body-file body.md --label dependencies || \
            gh issue create --title "$ISSUE_TITLE" --body-file body.md
          fi
