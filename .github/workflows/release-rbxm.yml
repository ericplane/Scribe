name: Bundle rbxm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Gate the release artifact on the full test/lint/type-check suite.
  verify:
    uses: ./.github/workflows/ci.yml

  bundle:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the asset to the release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Installs the exact tools pinned in rokit.toml (wally + rojo).
      - uses: CompeyDev/setup-rokit@d49be92bd9502180218c3f43e7988faa945217b0 # v0.1.2

      - name: Determine version
        id: ver
        # Event data via env, never inline in the script body (a release tag can
        # legally contain shell metacharacters -> code-injection vector).
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            VER="${TAG_NAME#v}"            # strip a leading v (v1.0.1 -> 1.0.1)
          else
            VER="$(grep -m1 '^version' wally.toml | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "value=${VER}" >> "$GITHUB_OUTPUT"

      # Guard: the tag must match the source-of-truth version files, or the
      # release would ship an artifact whose runtime self-reports a different
      # version than its label (and a stale Wally/docs version).
      - name: Verify version files match the tag
        env:
          VER: ${{ steps.ver.outputs.value }}
        run: |
          WALLY_VER="$(grep -m1 '^version' wally.toml | sed 's/.*"\(.*\)".*/\1/')"
          SRC_VER="$(grep -o '"[0-9][^"]*"' src/Internal/Version.luau | tr -d '"')"
          if [ "$WALLY_VER" != "$VER" ] || [ "$SRC_VER" != "$VER" ]; then
            echo "::error::version mismatch: tag=$VER wally.toml=$WALLY_VER Version.luau=$SRC_VER"
            echo "Bump wally.toml, src/Internal/Version.luau, and the README install snippet before tagging."
            exit 1
          fi

      # Shared with bundle-smoke.yml: install deps, copy & sanitize ProfileStore,
      # run the off-platform URL backstop, stamp the version, and build the model.
      - name: Assemble & build Scribe.rbxm
        uses: ./.github/actions/assemble-bundle
        with:
          version: ${{ steps.ver.outputs.value }}

      - name: Attach to the release
        if: github.event_name == 'release'
        run: gh release upload "$TAG_NAME" Scribe.rbxm --clobber
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Upload as a workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Scribe-rbxm
          path: Scribe.rbxm
